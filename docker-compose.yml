version: '3.8'

services:
  tg_manager_bot:
    build: 
      context: .
      dockerfile: Dockerfile.bot
    container_name: telegram-access-manager-bot
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data

  web_dashboard:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: telegram-web-dashboard
    restart: always
    ports:
      - "127.0.0.1:8080:8000"
    env_file: .env
    volumes:
      - ./data:/app/data